[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Force completely clean builds - disable all caching
  NETLIFY_CACHE_ENABLED = "false"
  # Add a timestamp to force rebuild
  BUILD_TIMESTAMP = "20260228"

# Use the official Next.js plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"
