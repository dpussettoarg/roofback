[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# No @netlify/plugin-nextjs — the plugin has a cache invalidation bug with Next.js 16
# that causes stale HTML (with old chunk hashes) to be served after every new deploy.
# Netlify's built-in Next.js runtime handles this correctly.

# HTML pages: never cache — prevents CDN from serving stale HTML after deploys
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store"

# CSS chunks: force correct MIME type
[[headers]]
  for = "/_next/static/chunks/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# JS chunks: force correct MIME type
[[headers]]
  for = "/_next/static/chunks/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/pages/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"
